spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME}    
      password: ${SPRING_SECURITY_USER_PASSWORD

server:
  port: 8080
