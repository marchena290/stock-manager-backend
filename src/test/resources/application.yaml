# Configuración para tests: H2 en memoria y valores por defecto para placeholders.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  security:
    user:
      name: testuser
      password: testpass

app:
  jwt:
    secret: test-secret-minimo-32-caracteres-para-hs256
    expiration-ms: 3600000
